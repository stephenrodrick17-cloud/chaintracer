services:
  - type: web
    name: fraud-detection-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port 10000"
    autoDeploy: true
    healthCheckPath: "/health"

staticSites:
  - name: fraud-detection-frontend
    env: static
    plan: free
    buildCommand: "cd chaintracker-1-master/frontend && npm install && npm run build"
    publishDir: "chaintracker-1-master/frontend/dist"
    autoDeploy: true
